# Netlify deployment configuration for Child Vaccination System frontend

# Build settings
[build]
  command = "echo 'Static site - no build required'"
  publish = "child-vaccination-system/frontend"
  # No build step needed for static HTML/CSS/JS site

# Environment variables (set these in Netlify UI or uncomment here)
[build.environment]
  # Point to your Render backend
  # API_BASE_URL = "https://your-render-backend.onrender.com/api"

# Redirect HTML files from root to pages directory (for accessing dashboard.html at /)
[[redirects]]
  from = "/dashboard"
  to = "/pages/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/parent-login"
  to = "/pages/parent-login.html"
  status = 200

[[redirects]]
  from = "/parent-dashboard"
  to = "/pages/parent-dashboard.html"
  status = 200

# Set security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Caching configuration
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/pages/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
